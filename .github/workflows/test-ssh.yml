name: Test SSH

on:
  push:
    branches:
      - '**'

jobs:
  test-ssh:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup SSH
      uses: webfactory/ssh-agent@v0.9.0
      with:
        ssh-private-key: ${{ secrets.INSTAWP_DEPLOY_SSH_PRIVATE_KEY }}

    - name: Add server to known hosts
      run: |
        ssh-keyscan -H zaver-checkout-test.krokedil.site >> ~/.ssh/known_hosts

    - name: Check SSH connectivity
      run: |
        ssh -v beviranudi5807@zaver-checkout-test.krokedil.site "echo 'SSH connection successful'"

    - name: Create test file on server
      run: |
        ssh -v beviranudi5807@zaver-checkout-test.krokedil.site "echo 'This is a test file' > ~/test.txt"

    - name: Verify test file creation
      run: |
        ssh -v beviranudi5807@zaver-checkout-test.krokedil.site "ls -l ~/test.txt"

    - name: Check home directory contents
      run: |
        ssh -v beviranudi5807@zaver-checkout-test.krokedil.site "ls -l ~"

    - name: Check current directory
      run: |
        ssh -v beviranudi5807@zaver-checkout-test.krokedil.site "pwd"

    - name: Check file creation in /tmp
      run: |
        ssh -v beviranudi5807@zaver-checkout-test.krokedil.site "echo 'This is a test file' > /tmp/test.txt && ls -l /tmp/test.txt"