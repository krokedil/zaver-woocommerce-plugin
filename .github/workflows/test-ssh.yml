name: Test SSH

on:
  push:
    branches:
      - '**'

jobs:
  test-ssh:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install sshpass
      run: sudo apt-get update && sudo apt-get install -y sshpass

    - name: Setup SSH
      uses: webfactory/ssh-agent@v0.9.0
      with:
        ssh-private-key: ${{ secrets.INSTAWP_DEPLOY_SSH_PRIVATE_KEY }}

    - name: Add server to known hosts
      run: |
        ssh-keyscan -H zaver-checkout-test.krokedil.site >> ~/.ssh/known_hosts

    - name: Create and execute shell script on server
      run: |
        sshpass -p "${{ secrets.INSTAWP_ZAVER_CHECKOUT_TEST_SSH_PASSWORD }}" ssh -o StrictHostKeyChecking=no beviranudi5807@zaver-checkout-test.krokedil.site "pwd"